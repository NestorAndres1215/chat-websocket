<div class="login-wrapper">
  <div class="login-card">

    <div class="icon-circle">
      <svg viewBox="0 0 24 24" width="36" height="36" fill="#ffffff">
        <path d="M12 2C6.48 2 2 6.03 2 11c0 2.25 1.02 4.29 2.7 5.85L4 22l5.4-1.42c.83.24 1.7.37 2.6.37 5.52 0 10-4.03 10-9S17.52 2 12 2zm0 16.5c-.86 0-1.7-.12-2.48-.35l-.36-.1-2.9.76.74-2.83-.24-.3C5.7 14.4 5 12.77 5 11c0-3.86 3.14-7 7-7s7 3.14 7 7-3.14 7.5-7 7.5z"/>
      </svg>
    </div>

    <h2>Entrar al chat</h2>
    <p class="subtitle">Ingresá tu nombre para comenzar</p>

    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" fill="#8696a0">
        <path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.2c-3.3 0-9.8 1.7-9.8 4.9v2.7h19.6v-2.7c0-3.2-6.5-4.9-9.8-4.9z"/>
      </svg>
      <input [(ngModel)]="username" placeholder="Nombre" (keyup.enter)="login()" />
    </div>

    <button (click)="login()" [disabled]="!username">
      Entrar
    </button>

  </div>
</div>
